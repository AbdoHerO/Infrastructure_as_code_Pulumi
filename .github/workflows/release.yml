name: Signed release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
          - os: ubuntu-latest
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cloudforge/desktop package -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.os == 'windows-latest' && secrets.WIN_CSC_LINK || secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: cloudforge-${{ matrix.artifact }}
          path: apps/desktop/release/**
          if-no-files-found: error
      - uses: anchore/sbom-action@v0
        with:
          path: apps/desktop/release
          format: cyclonedx-json
          output-file: cloudforge-${{ matrix.artifact }}.cdx.json
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: apps/desktop/release/**
