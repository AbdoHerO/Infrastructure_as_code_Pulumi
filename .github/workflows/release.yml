name: Windows release
run-name: Windows release - ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test-package-publish:
    name: Test, package and publish Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: pnpm

      - name: Verify semantic tag matches application version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must be semantic, for example v0.2.0 (received $tag)"
          }
          $version = (Get-Content apps/desktop/package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne "v$version") {
            throw "Tag $tag does not match apps/desktop/package.json version $version"
          }

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cloudforge/database prisma:generate

      - name: Formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type checking
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Production dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Build Windows NSIS installer
        run: pnpm --filter @cloudforge/desktop package -- --win nsis --publish never
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # latest.yml is required for update discovery and the blockmap enables
      # differential downloads. They belong to the Windows updater; they are
      # not macOS/Linux builds.
      - name: Publish Windows release assets
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag.TrimStart('v')
          $assets = @(
            "apps/desktop/release/CloudForge-$version-setup.exe",
            "apps/desktop/release/CloudForge-$version-setup.exe.blockmap",
            "apps/desktop/release/latest.yml"
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset)) {
              throw "Required Windows release asset is missing: $asset"
            }
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "CloudForge $tag" --generate-notes --verify-tag
            if ($LASTEXITCODE -ne 0) { throw "Could not create GitHub release $tag" }
          }

          gh release upload $tag $assets --clobber
          if ($LASTEXITCODE -ne 0) { throw "Could not upload Windows release assets" }

          $publishedAssets = gh release view $tag --json assets --jq '.assets[].name'
          if ($LASTEXITCODE -ne 0) { throw "Could not verify GitHub release assets" }
          foreach ($asset in $assets) {
            $expectedName = Split-Path -Leaf $asset
            if ($publishedAssets -notcontains $expectedName) {
              throw "GitHub release is incomplete after upload: $expectedName is missing"
            }
          }
          Write-Host "Verified Windows installer and updater metadata on GitHub Release $tag"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
