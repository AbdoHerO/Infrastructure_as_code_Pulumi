name: Windows release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test-package-publish:
    name: Test, package and publish Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: pnpm

      - name: Verify semantic tag matches application version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must be semantic, for example v0.2.0 (received $tag)"
          }
          $version = (Get-Content apps/desktop/package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne "v$version") {
            throw "Tag $tag does not match apps/desktop/package.json version $version"
          }

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type checking
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Production dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Build NSIS installer and publish GitHub Release
        run: pnpm --filter @cloudforge/desktop package -- --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload workflow copy
        uses: actions/upload-artifact@v4
        with:
          name: CloudForge-${{ github.ref_name }}-windows
          path: apps/desktop/release/**
          if-no-files-found: error
          retention-days: 14

      - name: Publish release and mark it latest
        shell: pwsh
        run: gh release edit '${{ github.ref_name }}' --draft=false --prerelease=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release SBOM
        uses: anchore/sbom-action@v0
        with:
          path: apps/desktop/release
          format: cyclonedx-json
          output-file: CloudForge-${{ github.ref_name }}.cdx.json

      - name: Attach SBOM to GitHub Release
        shell: pwsh
        run: gh release upload '${{ github.ref_name }}' 'CloudForge-${{ github.ref_name }}.cdx.json' --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: apps/desktop/release/**
