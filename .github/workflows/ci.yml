name: Code quality
run-name: quality - ${{ github.ref_name }}

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cloudforge/database prisma:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - name: Production dependency audit
        shell: bash
        run: |
          set +e
          audit_output="$(pnpm audit --prod --audit-level high 2>&1)"
          audit_exit=$?
          set -e
          printf '%s\n' "$audit_output"
          if [ "$audit_exit" -eq 0 ]; then exit 0; fi
          if printf '%s' "$audit_output" | grep -q 'ERR_PNPM_AUDIT_BAD_RESPONSE' \
            && printf '%s' "$audit_output" | grep -q 'responded with 410' \
            && printf '%s' "$audit_output" | grep -q 'endpoint is being retired'; then
            echo '::warning::npm retired the audit endpoint used by pnpm 9; no audit result was available.'
            exit 0
          fi
          exit "$audit_exit"
