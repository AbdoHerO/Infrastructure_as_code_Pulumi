name: Code quality
run-name: quality - ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.6
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cloudforge/database prisma:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm audit --prod --audit-level high
