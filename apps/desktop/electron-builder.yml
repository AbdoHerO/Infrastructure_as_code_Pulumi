appId: com.cloudforge.desktop
productName: CloudForge
copyright: Copyright © CloudForge

directories:
  output: release
  buildResources: build

# The main/preload/renderer bundles live in `out/`; workspace packages are
# bundled into them, so only the externalized native/runtime deps
# (@prisma/client, ssh2, @pulumi/pulumi) are collected from node_modules.
files:
  - out/**
  - '!**/*.map'

# Native modules and the Prisma query engine must be unpacked from the asar so
# they can be dlopen'd / spawned at runtime.
asarUnpack:
  - '**/node_modules/@prisma/**'
  - '**/node_modules/prisma/**'
  - '**/node_modules/.prisma/**'
  - '**/node_modules/ssh2/**'
  - '**/node_modules/@pulumi/**'

npmRebuild: true

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

mac:
  target:
    - dmg
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
