appId: com.cloudforge.desktop
productName: CloudForge
copyright: Copyright © CloudForge

directories:
  output: release
  buildResources: build

# The main/preload/renderer bundles live in `out/`; workspace packages are
# bundled into them, so only the externalized native/runtime deps
# (@prisma/client, ssh2, @pulumi/pulumi) are collected from node_modules.
files:
  - out/**
  - '!**/*.map'

extraResources:
  - from: node_modules/.prisma/client
    to: app/node_modules/.prisma/client
    filter:
      - '**/*'
      - '!*.tmp*'

# Abort before creating an installer if Prisma's generated client or native
# query engine was not copied into the packaged application payload.
afterPack: scripts/verify-packaged-runtime.cjs

# Prisma, SSH2 and Pulumi load native binaries or spawn runtime files by their
# real paths. Keeping the application unpacked makes those paths deterministic
# across clean Windows installations (including pnpm's generated .prisma client).
asar: false

npmRebuild: true

publish:
  provider: github
  owner: AbdoHerO
  repo: Infrastructure_as_code_Pulumi
  releaseType: release

win:
  icon: icon.png
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

mac:
  target:
    - dmg
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
